<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ping Pong Counter</title>
    <script type="module" crossorigin src="/voice-counter-website/assets/index-Iv7RKlvi.js"></script>
    <link rel="stylesheet" crossorigin href="/voice-counter-website/assets/index-BY1LHf-m.css">
  </head>
  <body>
    <main class="app-shell">
      <section class="control-panel" aria-label="Voice controls">
        <div class="listening-status">
          <div id="listening-indicator" class="listening-inactive" aria-label="Not listening"></div>
          <div>
            <p class="status-label">Microphone</p>
            <p class="status-value" id="listening-status-text">Not listening</p>
          </div>
        </div>

        <button id="mic-toggle" class="primary-button" type="button">Start Listening</button>
      </section>

      <div id="error-message" class="message error-message" role="alert" aria-live="polite"></div>
      <div id="scoreboard" class="scoreboard-grid"></div>
      <div id="feedback" class="message feedback-message" aria-live="polite"></div>
    </main>
  </body>
</html>
